name: Daily Auto Monitor + Report

on:
  schedule:
    - cron: '0 23,11 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install python-dotenv

      - name: Smoke test
        run: python _smoke_test.py

      - name: Run Auto Monitor
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_AUTH: ${{ secrets.ALERT_EMAIL_AUTH }}
          ALERT_EMAIL_SMTP: ${{ secrets.ALERT_EMAIL_SMTP }}
          ALERT_EMAIL_PORT: ${{ secrets.ALERT_EMAIL_PORT }}
        run: python auto_monitor.py

      - name: Commit monitor log
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@honestgadgets.com"
          git add auto_monitor.log health_report.md
          git diff --staged --quiet && exit 0
          git commit -m "Auto: monitor report [skip ci]"
          git push origin master 2>&1 || echo "[WARN] Push failed (GFW)"
