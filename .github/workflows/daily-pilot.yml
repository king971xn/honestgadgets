name: Daily Review + Auto Deploy (Cloud)

on:
  schedule:
    # 每天北京时间凌晨 3:00 (UTC 19:00)
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for surge)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install surge
        run: npm install -g surge

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install python-dotenv

      - name: Run AutoPilot (content generation)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          PUSH_DEER_KEY: ${{ secrets.PUSH_DEER_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: python auto_pilot.py

      - name: Commit new content to repo
        run: |
          git config user.name "AutoPilot Bot"
          git config user.email "bot@honestgadgets.com"
          git add reviews/ compare/ index.html compare.html sitemap.xml rss.xml auto_pilot.log health_report.md indexnow-key.txt deploy/
          git diff --staged --quiet || (git commit -m "Auto: daily content refresh [skip ci]" && git push origin main)
