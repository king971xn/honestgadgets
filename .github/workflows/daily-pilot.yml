name: Daily Review + Auto Deploy (Cloud)

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install python-dotenv

      - name: Pre-flight check (config validation)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          SURGE_EMAIL: ${{ secrets.SURGE_EMAIL }}
        run: python pre_flight.py

      - name: Smoke test (syntax + imports)
        run: python _smoke_test.py

      - name: Setup Node.js (for surge deploy)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install surge (non-fatal)
        run: npm install -g surge 2>&1 || echo "[WARN] surge install failed -- will skip deploy"
        continue-on-error: true

      - name: Verify surge available
        id: surge_check
        run: |
          if command -v surge >/dev/null 2>&1; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "[OK] surge CLI found"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "[WARN] surge CLI not found -- deploy will be skipped"
          fi

      - name: Run AutoPilot (content generation)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          PUSH_DEER_KEY: ${{ secrets.PUSH_DEER_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          SURGE_EMAIL: ${{ secrets.SURGE_EMAIL }}
        run: python auto_pilot.py

      - name: Run Self-Heal
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python self_heal.py

      - name: Debug (self_heal log)
        if: always()
        run: |
          echo "=== self_heal.log ==="
          cat self_heal.log 2>/dev/null || echo "(not found)"
          echo "=== auto_pilot.log (tail 30) ==="
          tail -30 auto_pilot.log 2>/dev/null || echo "(not found)"

      - name: Run Health Check
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          PUSH_DEER_KEY: ${{ secrets.PUSH_DEER_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: python health_check.py

      - name: Commit & push
        run: |
          git config user.name "AutoPilot Bot"
          git config user.email "bot@honestgadgets.com"
          git add reviews/ compare/ index.html compare.html sitemap.xml rss.xml auto_pilot.log health_report.md indexnow-key.txt deploy/ self_heal.log 2>/dev/null || true
          git diff --staged --quiet && echo "[SKIP] No changes to commit" && exit 0
          git commit -m "Auto: daily content refresh [skip ci]"
          git push origin master 2>&1 || echo "[WARN] Push failed (expected under GFW) -- changes saved locally"
