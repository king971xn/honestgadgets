name: Weekly Product Discovery (AutoSourcer)

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  discover_products:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install python-dotenv

      - name: Smoke test
        run: python _smoke_test.py

      - name: Run AutoSourcer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
        run: python auto_sourcer.py

      - name: Run AutoPilot (reviews-only, no deploy)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL_ID: ${{ secrets.DEEPSEEK_MODEL_ID }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python auto_pilot.py --reviews-only --no-deploy

      - name: Commit new products and reviews
        run: |
          git config user.name "AutoSourcer Bot"
          git config user.email "bot@honestgadgets.com"
          git add products.json reviews/ compare/ index.html sitemap.xml rss.xml sourcer.log
          git diff --staged --quiet && echo "[SKIP] No changes to commit" && exit 0
          git commit -m "Auto: weekly product discovery [skip ci]"
          git push origin master 2>&1 || echo "[WARN] Push failed (expected under GFW) -- changes saved locally"
